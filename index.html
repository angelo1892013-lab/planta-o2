<!DOCTYPE html>
<html>
<body>

<h1>🌱 Plantação</h1>

<p>Pontos: <span id="pontos">0</span></p>

<button onclick="plantar()">Plantar</button>
<button onclick="colher()">Colher</button>

<p id="estado">Nada plantado</p>

<script>
let pontos = 0;
let pronta = false;

function plantar() {
  document.getElementById("estado").innerText = "A crescer...";

  setTimeout(function() {
    pronta = true;
    document.getElementById("estado").innerText = "Pronta!";
  }, 3000);
}

function colher() {
  if (pronta == true) {
    pontos = pontos + 1;
    document.getElementById("pontos").innerText = pontos;
    document.getElementById("estado").innerText = "Colheste!";
    pronta = false;
  } else {
    document.getElementById("estado").innerText = "Ainda não está pronta!";
  }
}
</script>

</body>
</html>
